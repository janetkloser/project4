  <div class="container">
    <h1>Your Habit Tracker</h1>
     <div class="row">
  <div class="col-12 col-md-6">
  <div class="section"> 
    <h2>Todays Habits</h2>
    <h3>Today your habits are...</h3>

<div class="form-check">
  <input class="form-check-input habit-checkbox" type="checkbox" name="habits" value="skin" id="skin">
  <label class="form-check-label" for="skin">
    skincare
  </label>
</div> <!-- close skincare -->

<div class="form-check">
  <input class="form-check-input habit-checkbox" type="checkbox" name="habits" value="water1" id="water1">
  <label class="form-check-label" for="water1">
    drink 1 stanley of water
  </label>
</div> <!-- close water -->

<div class="form-check">
  <input class="form-check-input habit-checkbox" type="checkbox" name="habits" value="water2" id="water2">
  <label class="form-check-label" for="water2">
    drink 2 stanley of water
  </label>
</div> <!-- close water 2 -->

<div class="form-check">
  <input class="form-check-input habit-checkbox" type="checkbox" name="habits" value="water3" id="water3">
  <label class="form-check-label" for="water3">
    drink 3 stanley of water
  </label>
</div> <!-- close water 3 -->

<div class="form-check">
  <input class="form-check-input habit-checkbox" type="checkbox" name="habits" value="walk" id="walk">
  <label class="form-check-label" for="walk">
    go for a walk
  </label>
</div> <!-- close walk -->

<div class="form-check">
  <input class="form-check-input habit-checkbox" type="checkbox" name="habits" value="workout" id="workout">
  <label class="form-check-label" for="workout">
    do ab workout
  </label>
</div>

<div class="text-center">
<button class="btn btn-primary" type="submit">Save Todays Habits</button>
  </div> <!-- text center -->
</div> <!-- closes section -->
</div> <!-- closes habits column -->


  <div class="col-12 col-md-6">
    <div class="section">
    <h2>Todays Progress</h2>
    <div class="progress" role="progressbar" aria-label="Basic example" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">
  <div class="progress-bar w-75"></div> <!-- progressbar -->
</div> <!-- progress -->
</div> <!-- section -->
</div>
</div>


<div class="row">
    <div class="col-12 col-md-6">
<div class="section">
  <h2> Your Streak</h2>
    <img src="images/streak.png" alt="Completion streak of daily habits">
  </div> <!-- section -->
</div> <!-- closes column -->


<div class="col-12 col-md-6">
        <div class="section">
      <div class="card">
        <div class="card-header">
      New Habit
    </div> <!-- Card header -->
  <div class="card-body">
    <h3 class="card-title">Add a new habit!</h3>
    <a href="newhabit.html" class="btn btn-primary">Click Here</a>
  </div> <!-- card -->
</div> <!-- class -->
</div> <!-- text center -->
</div> <!-- closes row -->
</div> <!-- container -->
</div>
